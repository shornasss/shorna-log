<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shorna'S Log</title>
  <style>
    :root {
      --bg-color: #f4f4f4;
      --text-color: #333;
      --header-bg: #444;
      --nav-bg: #222;
      --box-bg: #ddd;
      --shadow: 5px 5px 15px #bebebe, -5px -5px 15px #ffffff;
      --accent-color: #ff5722;
    }

    .dark-mode {
      --bg-color: #A6A6A6;
      --text-color: #DBDBDB;
      --header-bg: #222;
      --nav-bg: #333;
      --box-bg: #8c8c8c;
      --shadow: 5px 5px 15px #8e8e8e, -5px -5px 15px #bebebe;
      --accent-color: #ffccbc;
    }

    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); transition: all 0.3s ease; }
    header { background: var(--header-bg); color: #fff; padding: 15px; text-align: center; }
    nav { background: var(--nav-bg); display: flex; justify-content: center; padding: 10px; gap: 10px; }

    .dropdown { position: relative; }
    .dropbtn { color: white; padding: 10px 25px; cursor: pointer; border: none; background: #444; border-radius: 5px; font-size: 16px; }
    .dropdown-content { display: none; position: absolute; background-color: #ffffff; min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 100; border-radius: 5px; top: 45px; }
    .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #eee; }
    .dropdown-content a:hover { background-color: #f1f1f1; }
    .show { display: block; }

    .container { display: flex; padding: 20px; gap: 25px; }
    .sidebar { width: 28%; }
    .content { width: 72%; }

    .glass-box { background: var(--box-bg); padding: 15px; margin-bottom: 25px; border-radius: 15px; box-shadow: var(--shadow); text-align: center; }
    #time, #currentDateDisplay { font-weight: bold; font-size: 1.4em; color: var(--accent-color); text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

    .note { background: var(--box-bg); border-radius: 10px; padding: 15px; min-height: 150px; box-shadow: var(--shadow); margin-bottom: 10px; outline: none; white-space: pre-wrap; }
    
    .translation-box { margin-top: 10px; padding: 10px; background: #eef; border-radius: 8px; font-style: italic; color: #555; border-left: 5px solid var(--accent-color); }
    
    .btn-action { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; margin-right: 10px; font-weight: bold; }
    .btn-save { background: #27ae60; color: white; }
    .btn-clear { background: #e74c3c; color: white; }

    .reg-item { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
    .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    
    .ai-link { display: block; margin-top: 15px; color: #007bff; text-decoration: none; font-weight: bold; }
    .ai-link:hover { text-decoration: underline; }
  </style>
</head>
<body onclick="hideMenus()">

  <header><h1>Shorna'S Log</h1></header>
  
  <nav>
    <div class="dropdown">
      <button onclick="toggleMenu(event, 'homeMenu')" class="dropbtn">Home ▼</button>
      <div id="homeMenu" class="dropdown-content">
        <a href="#" onclick="showDraftPage('notEligible')">Not Eligible appeal</a>
        <a href="#" onclick="showDraftPage('determination')">Determination</a>
        <a href="#" onclick="showDraftPage('additional')">Additional</a>
        <a href="#" onclick="showDraftPage('withdraw')">Withdraw</a>
        <a href="#" onclick="showDraftPage('technical')">Technical Issue</a>
      </div>
    </div>
    <div class="dropdown">
      <button onclick="toggleMenu(event, 'personalMenu')" class="dropbtn">Personal ▼</button>
      <div id="personalMenu" class="dropdown-content">
        <a href="#" onclick="showPlaceholderPage('All Script')">All Script</a>
        <a href="#" onclick="showRegularPage()">Regular</a>
      </div>
    </div>
  </nav>
  
  <div class="container">
    <div class="sidebar">
      <div class="glass-box"><h3>Time</h3><p id="time"></p></div>
      <div class="glass-box">
        <h3>Calendar</h3>
        <p id="currentDateDisplay"></p>
        <input type="date" id="datePicker" style="width:90%; padding:5px; margin-top:10px;">
      </div>
      <div class="glass-box">
        <h3>Mode</h3>
        <button onclick="toggleMode()" class="btn-action" style="background:#555; color:white; width: 80%;">Toggle Mode</button>
      </div>
    </div>
    
    <div class="content">
      <div id="mainContent">
        <h2>Personal Information</h2>
        <p><strong>Name:</strong> Shorna | <strong>Team:</strong> BCBS</p>
        
        <h2>Notepad</h2>
        <div id="notePad" class="note" contenteditable="true" oninput="handleNoteInput()"></div>
        <div class="translation-box" id="translationOutput">Bengali translation will appear here...</div>
        
        <div style="margin-top:10px;">
          <button onclick="saveNote()" class="btn-save btn-action">Save to Regular</button>
          <button onclick="clearNotes()" class="btn-clear btn-action">Clear</button>
        </div>
        
        <a href="https://duckduckgo.com/?q=DuckDuckGo+AI+Chat&ia=chat" target="_blank" class="ai-link">Open DuckDuckGo AI Chat</a>
      </div>
    </div>
  </div>

  <script>
    // Load data on startup
    window.onload = function() {
      const savedNote = localStorage.getItem('shornaNote');
      if (savedNote) document.getElementById('notePad').innerText = savedNote;
      updateTime();
      if (localStorage.getItem('shornaMode') === 'dark') document.body.classList.add('dark-mode');
    };

    function handleNoteInput() {
      const text = document.getElementById('notePad').innerText;
      localStorage.setItem('shornaNote', text);
      translateText(text);
    }

    // Basic English to Bangla Logic (Placeholder for actual API integration if needed)
    async function translateText(text) {
      if(!text.trim()) { document.getElementById('translationOutput').innerText = "..."; return; }
      // Using a free public API for demonstration
      try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=bn&dt=t&q=${encodeURI(text)}`);
        const data = await res.json();
        document.getElementById('translationOutput').innerText = data[0][0][0];
      } catch (e) { document.getElementById('translationOutput').innerText = "Translating..."; }
    }

    function saveNote() {
      const text = document.getElementById('notePad').innerText;
      if(!text.trim()) return;
      const date = new Date().toLocaleString();
      let regularFiles = JSON.parse(localStorage.getItem('shornaRegular') || "[]");
      regularFiles.push({ date: date, content: text });
      localStorage.setItem('shornaRegular', JSON.stringify(regularFiles));
      alert("Saved to Regular!");
    }

    function showRegularPage() {
      const files = JSON.parse(localStorage.getItem('shornaRegular') || "[]");
      let html = `<h2>Regular Files</h2><button class="btn-back btn-action" onclick="location.reload()">Back</button><div style="margin-top:20px;">`;
      files.forEach((file, index) => {
        html += `
          <div class="reg-item">
            <span onclick="viewFile(${index})" style="cursor:pointer; color:blue;">File: ${file.date}</span>
            <button class="btn-delete" onclick="deleteFile(${index})">Delete</button>
          </div>`;
      });
      document.getElementById('mainContent').innerHTML = html + `</div>`;
    }

    function viewFile(index) {
      const files = JSON.parse(localStorage.getItem('shornaRegular') || "[]");
      const file = files[index];
      document.getElementById('mainContent').innerHTML = `
        <h2>File Date: ${file.date}</h2>
        <div class="mail-view">${file.content}</div>
        <button class="btn-back btn-action" onclick="showRegularPage()">Back to List</button>
      `;
    }

    function deleteFile(index) {
      let files = JSON.parse(localStorage.getItem('shornaRegular') || "[]");
      files.splice(index, 1);
      localStorage.setItem('shornaRegular', JSON.stringify(files));
      showRegularPage();
    }

    function clearNotes() {
      document.getElementById('notePad').innerText = "";
      localStorage.removeItem('shornaNote');
      document.getElementById('translationOutput').innerText = "...";
    }

    function toggleMenu(e, id) {
      e.stopPropagation();
      hideMenus();
      document.getElementById(id).classList.toggle("show");
    }

    function hideMenus() {
      document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString();
      document.getElementById('currentDateDisplay').textContent = now.toDateString();
    }
    setInterval(updateTime, 1000);

    function toggleMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('shornaMode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // --- (Keep allDrafts and showDraftPage from previous code here) ---
    const allDrafts = { /* ... paste your previous drafts here ... */ };
    // (সব ড্রাফট কোড আগের মতোই থাকবে, শুধু showDraftPage ফাংশনটি কল করলেই হবে)
  </script>
</body>
</html>
